apiVersion: batch/v1
kind: Job
metadata:
  name: uce-benchmark-job
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: benchmark
        image: uce-benchmark:v1  # Replace with actual image
        command: ["python3", "main_benchmark.py"]
        args: ["--test_dir", "/data/test_data", "--indices_config", "/data/indices/config.txt"]
        volumeMounts:
        - name: data-volume
          mountPath: /data
        - name: aws-creds
          mountPath: /root/.aws
          readOnly: true
        env:
        - name: AWS_PROFILE
          value: "braingeneers"
      restartPolicy: Never
      volumes:
      - name: data-volume
        emptyDir: {}  # Use PVC in production
      - name: aws-creds
        secret:
          secretName: aws-credentials # Assumes a secret with credentials file
