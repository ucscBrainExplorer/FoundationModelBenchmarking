apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: benchmark-data-pvc
  namespace: braingeneers
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi  # Enough for FAISS index (~33GB) + test data + reference data
  # storageClassName: standard  # Uncomment and set to your cluster's storage class if needed
